<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة المزاد - درافت</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- شاشة اختيار اللاعب -->
    <div id="login-screen">
        <h2>اختر من أنت لتدخل الغرفة:</h2>
        <button onclick="joinGame('player1')">أنا اللاعب الأول</button>
        <button onclick="joinGame('player2')">أنا اللاعب الثاني</button>
        <br><br>
        <button onclick="resetGame()" style="background-color: red;">إعادة ضبط اللعبة من الصفر</button>
    </div>

    <!-- شاشة اللعب -->
    <div id="game-screen" style="display: none;">
        
        <!-- اللاعب الأول -->
        <div class="player-panel" id="panel-p1">
            <h3>اللاعب الأول <span id="you-p1" style="color:yellow;"></span></h3>
            <p>الميزانية: <span id="budget-p1" class="budget">120</span> مليون</p>
            <h4>التشكيلة (6 لاعبين):</h4>
            <ul id="team-p1"></ul>
        </div>

        <!-- منطقة المزاد -->
        <div class="auction-panel">
            <h2>المزاد الحالي</h2>
            <div id="player-card" class="card">
                <h3 id="card-name">انتظر بدء المزاد...</h3>
                <p>المركز: <span id="card-pos">-</span></p>
            </div>
            
            <div class="bid-info">
                <p>أعلى مزايدة: <span id="current-bid">0</span> مليون</p>
                <p>بواسطة: <span id="highest-bidder">لا أحد</span></p>
            </div>

            <button id="btn-bid" onclick="placeBid()">مزايدة (+1 مليون)</button>
            <button id="btn-next" onclick="nextPlayer()" style="display: none; background: #28a745;">طرح لاعب جديد</button>
        </div>

        <!-- اللاعب الثاني -->
        <div class="player-panel" id="panel-p2">
            <h3>اللاعب الثاني <span id="you-p2" style="color:yellow;"></span></h3>
            <p>الميزانية: <span id="budget-p2" class="budget">120</span> مليون</p>
            <h4>التشكيلة (6 لاعبين):</h4>
            <ul id="team-p2"></ul>
        </div>

    </div>

    <!-- مكتبات فايربيز -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
