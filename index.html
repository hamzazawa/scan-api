<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم البائعين - EPEC STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        /* لتنسيق شريط التمرير في النافذة المنبثقة */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col relative">

    <div id="loginScreen" class="flex flex-col justify-center items-center flex-grow p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 w-full max-w-sm text-center">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <h2 class="text-2xl font-black text-gray-800 mb-2">بوابة البائعين</h2>
            <p class="text-xs font-bold text-gray-500 mb-6">أدخل المفتاح السري الخاص بك للوصول لحساباتك</p>
            
            <input type="password" id="sellerKeyInput" placeholder="المفتاح السري..." class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3.5 mb-4 text-center font-mono tracking-widest outline-none transition">
            
            <button onclick="login()" id="loginBtn" class="w-full text-white bg-blue-600 hover:bg-blue-700 font-black rounded-xl text-sm px-5 py-3.5 text-center shadow-lg transition">
                تسجيل الدخول <i class="fa-solid fa-arrow-left-to-bracket ml-1"></i>
            </button>
            <p id="loginError" class="text-red-500 text-xs font-bold mt-3 hidden"></p>
        </div>
    </div>

    <div id="dashboardScreen" class="hidden flex-col flex-grow">
        <header class="bg-white border-b border-gray-200 py-4 sticky top-0 z-40 shadow-sm">
            <div class="container mx-auto px-4 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center text-sm">
                        <i class="fa-solid fa-store"></i>
                    </div>
                    <div>
                        <h1 class="text-sm font-black text-gray-800" id="welcomeName">مرحباً...</h1>
                        <p class="text-[10px] font-bold text-gray-500">لوحة الإدارة</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="openAddModal()" class="bg-green-100 hover:bg-green-200 text-green-700 border border-green-300 px-3 py-1.5 rounded-lg text-xs font-black transition flex items-center gap-1">
                        <i class="fa-solid fa-plus"></i> إضافة
                    </button>
                    <button onclick="logout()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-1">
                        خروج <i class="fa-solid fa-power-off"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="container mx-auto px-4 py-6 flex-grow">
            <h2 class="text-lg font-black text-gray-800 mb-4 border-r-4 border-blue-600 pr-2">حساباتي المعروضة</h2>
            
            <div id="loadingDash" class="flex justify-center py-10">
                <i class="fa-solid fa-spinner fa-spin text-3xl text-blue-500"></i>
            </div>

            <div id="sellerAccountsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 hidden">
            </div>
        </main>
    </div>

    <div id="addAccountModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-50 hidden flex justify-center items-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] flex flex-col overflow-hidden animate-fade-in-up">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="font-black text-gray-800 text-lg">إضافة حساب جديد</h3>
                <button onclick="closeAddModal()" class="text-gray-400 hover:text-red-500 transition w-8 h-8 flex items-center justify-center rounded-full bg-white border border-gray-200 shadow-sm">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div class="p-5 overflow-y-auto flex-grow">
                <form id="addForm" onsubmit="submitNewAccount(event)">
                    <div class="mb-4">
                        <label class="block text-xs font-bold text-gray-700 mb-1">صورة الحساب <span class="text-red-500">*</span></label>
                        <input type="file" id="accImage" accept="image/*" required class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 border border-gray-200 rounded-xl p-1 bg-white">
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs font-bold text-gray-700 mb-1">عنوان الحساب / الوصف <span class="text-red-500">*</span></label>
                        <input type="text" id="accTitle" required placeholder="مثال: حساب بيس قوي جدا..." class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">ثمن الشراء (البنك) <span class="text-red-500">*</span></label>
                            <input type="number" id="accBankPrice" required placeholder="بالدرهم" class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-left" dir="ltr">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">ثمن البيع (الويب) <span class="text-red-500">*</span></label>
                            <input type="number" id="accWebPrice" required placeholder="بالدرهم" class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-left" dir="ltr">
                        </div>
                    </div>

                    <div class="space-y-3 mb-4 p-3 bg-gray-50 rounded-xl border border-gray-200">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 mb-1">البريد الإلكتروني (اختياري)</label>
                            <input type="email" id="accEmail" placeholder="example@email.com" class="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-blue-500 text-left" dir="ltr">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 mb-1">كلمة السر (اختياري)</label>
                            <input type="text" id="accPassword" placeholder="password123" class="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-blue-500 text-left" dir="ltr">
                        </div>
                    </div>

                    <div class="flex gap-4 mb-6">
                        <label class="flex items-center gap-1.5 cursor-pointer">
                            <input type="checkbox" id="accGg" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500">
                            <span class="text-xs font-bold text-gray-700">مربوط بـ Google</span>
                        </label>
                        <label class="flex items-center gap-1.5 cursor-pointer">
                            <input type="checkbox" id="accIos" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500">
                            <span class="text-xs font-bold text-gray-700">iOS متوفر</span>
                        </label>
                    </div>

                    <button type="submit" id="submitAccBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-xl transition shadow-lg text-sm flex justify-center items-center">
                        نشر الحساب <i class="fa-solid fa-cloud-arrow-up ml-2"></i>
                    </button>
                    <p id="submitError" class="text-red-500 text-xs font-bold mt-2 text-center hidden"></p>
                </form>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full text-xs font-bold shadow-xl opacity-0 transition-opacity duration-300 z-50 pointer-events-none whitespace-nowrap">
        <span id="toastMsg">تمت العملية بنجاح</span> <i class="fa-solid fa-check text-green-400 ml-1"></i>
    </div>

    <script>
        const API_BASE_URL = 'https://serverfirebase.fly.dev/api';
        let currentSeller = '';

        // تشغيل التحقق التلقائي عند فتح الصفحة
        window.onload = () => {
            const savedKey = localStorage.getItem('epec_seller_key');
            if (savedKey) {
                document.getElementById('sellerKeyInput').value = savedKey;
                login(true);
            }
        };

        // 1. دالة تسجيل الدخول
        async function login(isAuto = false) {
            const key = document.getElementById('sellerKeyInput').value.trim();
            const btn = document.getElementById('loginBtn');
            const errorText = document.getElementById('loginError');

            if (!key) return;

            if (!isAuto) {
                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> جاري التحقق...';
            }
            errorText.classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json
