<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم البائعين - EPEC STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col relative">

    <div id="loginScreen" class="flex flex-col justify-center items-center flex-grow p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 w-full max-w-sm text-center">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <h2 class="text-2xl font-black text-gray-800 mb-2">بوابة البائعين</h2>
            <p class="text-xs font-bold text-gray-500 mb-6">أدخل المفتاح السري الخاص بك للوصول لحساباتك</p>
            
            <input type="password" id="sellerKeyInput" placeholder="المفتاح السري..." class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3.5 mb-4 text-center font-mono tracking-widest outline-none transition">
            
            <button onclick="login(false)" id="loginBtn" class="w-full text-white bg-blue-600 hover:bg-blue-700 font-black rounded-xl text-sm px-5 py-3.5 text-center shadow-lg transition">
                تسجيل الدخول <i class="fa-solid fa-arrow-left-to-bracket ml-1"></i>
            </button>
            <p id="loginError" class="text-red-500 text-xs font-bold mt-3 hidden"></p>
        </div>
    </div>

    <div id="dashboardScreen" class="hidden flex-col flex-grow">
        <header class="bg-white border-b border-gray-200 py-4 sticky top-0 z-40 shadow-sm">
            <div class="container mx-auto px-4 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center text-sm">
                        <i class="fa-solid fa-store"></i>
                    </div>
                    <div>
                        <h1 class="text-sm font-black text-gray-800" id="welcomeName">مرحباً...</h1>
                        <p class="text-[10px] font-bold text-gray-500">لوحة الإدارة</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="openAddModal()" class="bg-green-100 hover:bg-green-200 text-green-700 border border-green-300 px-3 py-1.5 rounded-lg text-xs font-black transition flex items-center gap-1">
                        <i class="fa-solid fa-plus"></i> إضافة
                    </button>
                    <button onclick="logout()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-1">
                        خروج <i class="fa-solid fa-power-off"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="container mx-auto px-4 py-6 flex-grow">
            <h2 class="text-lg font-black text-gray-800 mb-4 border-r-4 border-blue-600 pr-2">حساباتي المعروضة</h2>
            
            <div id="loadingDash" class="flex justify-center py-10">
                <i class="fa-solid fa-spinner fa-spin text-3xl text-blue-500"></i>
            </div>

            <div id="sellerAccountsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 hidden">
            </div>
        </main>
    </div>

    <div id="addAccountModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-50 hidden flex justify-center items-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] flex flex-col overflow-hidden animate-fade-in-up">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="font-black text-gray-800 text-lg">إضافة حساب جديد</h3>
                <button onclick="closeAddModal()" class="text-gray-400 hover:text-red-500 transition w-8 h-8 flex items-center justify-center rounded-full bg-white border border-gray-200 shadow-sm">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div class="p-5 overflow-y-auto flex-grow">
                <form id="addForm" onsubmit="submitNewAccount(event)">
                    <div class="mb-4">
                        <label class="block text-xs font-bold text-gray-700 mb-1">صورة الحساب <span class="text-red-500">*</span></label>
                        <input type="file" id="accImage" accept="image/*" required class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 border border-gray-200 rounded-xl p-1 bg-white">
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs font-bold text-gray-700 mb-1">عنوان الحساب / الوصف <span class="text-red-500">*</span></label>
                        <input type="text" id="accTitle" required placeholder="مثال: حساب بيس قوي جدا..." class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">ثمن الشراء (البنك) <span class="text-red-500">*</span></label>
                            <input type="number" id="accBankPrice" required placeholder="بالدرهم" class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-left" dir="ltr">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">ثمن البيع (الويب) <span class="text-red-500">*</span></label>
                            <input type="number" id="accWebPrice" required placeholder="بالدرهم" class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-left" dir="ltr">
                        </div>
                    </div>

                    <div class="space-y-3 mb-4 p-3 bg-gray-50 rounded-xl border border-gray-200">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 mb-1">البريد الإلكتروني (اختياري)</label>
                            <input type="email" id="accEmail" placeholder="example@email.com" class="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-blue-500 text-left" dir="ltr">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 mb-1">كلمة السر (اختياري)</label>
                            <input type="text" id="accPassword" placeholder="password123" class="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-blue-500 text-left" dir="ltr">
                        </div>
                    </div>

                    <div class="flex gap-4 mb-6">
                        <label class="flex items-center gap-1.5 cursor-pointer">
                            <input type="checkbox" id="accGg" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500">
                            <span class="text-xs font-bold text-gray-700">مربوط بـ Google</span>
                        </label>
                        <label class="flex items-center gap-1.5 cursor-pointer">
                            <input type="checkbox" id="accIos" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500">
                            <span class="text-xs font-bold text-gray-700">iOS متوفر</span>
                        </label>
                    </div>

                    <button type="submit" id="submitAccBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-xl transition shadow-lg text-sm flex justify-center items-center">
                        نشر الحساب <i class="fa-solid fa-cloud-arrow-up ml-2"></i>
                    </button>
                    <p id="submitError" class="text-red-500 text-xs font-bold mt-2 text-center hidden"></p>
                </form>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full text-xs font-bold shadow-xl opacity-0 transition-opacity duration-300 z-50 pointer-events-none whitespace-nowrap">
        <span id="toastMsg">تمت العملية بنجاح</span> <i class="fa-solid fa-check text-green-400 ml-1"></i>
    </div>

    <script>
        const API_BASE_URL = 'https://serverfirebase.fly.dev/api';
        let currentSeller = '';

        window.onload = () => {
            // دعم الضغط على Enter من لوحة المفاتيح
            document.getElementById('sellerKeyInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    login(false);
                }
            });

            const savedKey = localStorage.getItem('epec_seller_key');
            if (savedKey) {
                document.getElementById('sellerKeyInput').value = savedKey;
                login(true);
            }
        };

        // 1. دالة تسجيل الدخول
        async function login(isAuto) {
            const key = document.getElementById('sellerKeyInput').value.trim();
            const btn = document.getElementById('loginBtn');
            const errorText = document.getElementById('loginError');

            // إذا الخانة فارغة، نظهر خطأ للمستخدم بدلاً من التوقف الصامت
            if (!key) {
                errorText.innerText = "المرجو إدخال المفتاح السري أولاً!";
                errorText.classList.remove('hidden');
                return;
            }

            if (isAuto !== true) {
                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> جاري التحقق...';
                btn.disabled = true;
            }
            errorText.classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sellerKey: key })
                });

                const result = await response.json();

                if (result.success) {
                    currentSeller = result.sellerName;
                    localStorage.setItem('epec_seller_key', key);
                    
                    document.getElementById('welcomeName').innerText = `مرحباً، ${currentSeller}`;
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('dashboardScreen').classList.remove('hidden');
                    document.getElementById('dashboardScreen').classList.add('flex');
                    
                    fetchMyAccounts();
                } else {
                    errorText.innerText = result.message;
                    errorText.classList.remove('hidden');
                    localStorage.removeItem('epec_seller_key'); 
                }
            } catch (error) {
                errorText.innerText = "تعذر الاتصال بالسيرفر. (أعد المحاولة)";
                errorText.classList.remove('hidden');
            } finally {
                if (isAuto !== true) {
                    btn.innerHTML = 'تسجيل الدخول <i class="fa-solid fa-arrow-left-to-bracket ml-1"></i>';
                    btn.disabled = false;
                }
            }
        }

        // 2. دالة جلب حسابات البائع
        async function fetchMyAccounts() {
            const grid = document.getElementById('sellerAccountsGrid');
            const loader = document.getElementById('loadingDash');
            
            grid.innerHTML = '';
            loader.classList.remove('hidden');
            grid.classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE_URL}/my-accounts/${currentSeller}`);
                const result = await response.json();

                loader.classList.add('hidden');
                grid.classList.remove('hidden');

                if (result.success && result.data && Object.keys(result.data).length > 0) {
                    let accountsArray = Object.keys(result.data).map(key => {
                        return { id: key, ...result.data[key] };
                    }).reverse();

                    accountsArray.forEach(acc => {
                        let priceWeb = acc.price_web || 0;
                        let bankPrice = acc.bank_price || 0;

                        grid.innerHTML += `
                        <div class="bg-white rounded-xl overflow-hidden border border-gray-200 shadow-sm flex flex-col relative">
                            <div class="relative h-36 w-full bg-gray-100 group">
                                <img src="${acc.img}" class="w-full h-full object-cover">
                                <button onclick="downloadImage('${acc.img}', '${acc.id}')" class="absolute top-2 right-2 bg-black/60 hover:bg-black text-white w-8 h-8 rounded-full flex justify-center items-center backdrop-blur-sm transition">
                                    <i class="fa-solid fa-download text-xs"></i>
                                </button>
                                <div class="absolute bottom-2 right-2 bg-blue-600 text-white text-[9px] font-black px-2 py-1 rounded">متوفر</div>
                            </div>
                            <div class="p-3 flex-grow flex flex-col">
                                <h3 class="font-bold text-xs text-gray-800 mb-2 line-clamp-1" title="${acc.title}">${acc.title}</h3>
                                <div class="flex gap-2 mb-3">
                                    <div class="flex-1 bg-gray-50 border border-gray-100 p-1.5 rounded-lg text-center">
                                        <p class="text-[9px] text-gray-400 font-bold mb-0.5">ثمن الشراء</p>
                                        <p class="text-xs font-black text-gray-600">${bankPrice} MAD</p>
                                    </div>
                                    <div class="flex-1 bg-blue-50 border border-blue-100 p-1.5 rounded-lg text-center">
                                        <p class="text-[9px] text-blue-500 font-bold mb-0.5">ثمن البيع</p>
                                        <p class="text-xs font-black text-blue-700">${priceWeb} MAD</p>
                                    </div>
                                </div>
                                <div class="space-y-1.5 mb-3">
                                    <div class="flex items-center gap-1.5 bg-gray-50 border border-gray-200 rounded p-1.5">
                                        <i class="fa-solid fa-envelope text-gray-400 text-[10px] ml-1"></i>
                                        <span class="text-[10px] font-bold text-gray-700 flex-grow truncate dir-ltr text-left">${acc.email || 'لا يوجد'}</span>
                                        <button onclick="copyText('${acc.email}')" class="text-gray-400 hover:text-blue-500 transition px-1"><i class="fa-regular fa-copy text-[11px]"></i></button>
                                    </div>
                                    <div class="flex items-center gap-1.5 bg-gray-50 border border-gray-200 rounded p-1.5">
                                        <i class="fa-solid fa-key text-gray-400 text-[10px] ml-1"></i>
                                        <span class="text-[10px] font-bold text-gray-700 flex-grow truncate dir-ltr text-left">${acc.password || 'لا يوجد'}</span>
                                        <button onclick="copyText('${acc.password}')" class="text-gray-400 hover:text-blue-500 transition px-1"><i class="fa-regular fa-copy text-[11px]"></i></button>
                                    </div>
                                </div>
                                <div class="grid grid-cols-4 gap-1.5 mt-auto pt-2 border-t border-gray-100">
                                    <button onclick="actionAlert('حذف')" class="bg-red-50 hover:bg-red-100 text-red-600 py-1.5 rounded text-[10px] font-bold transition flex flex-col items-center gap-0.5">
                                        <i class="fa-solid fa-trash-can"></i> حذف
                                    </button>
                                    <button onclick="actionAlert('تعديل')" class="bg-orange-50 hover:bg-orange-100 text-orange-600 py-1.5 rounded text-[10px] font-bold transition flex flex-col items-center gap-0.5">
                                        <i class="fa-solid fa-pen"></i> تعديل
                                    </button>
                                    <button onclick="actionAlert('مؤقت')" class="bg-gray-100 hover:bg-gray-200 text-gray-700 py-1.5 rounded text-[10px] font-bold transition flex flex-col items-center gap-0.5">
                                        <i class="fa-solid fa-clock"></i> مؤقت
                                    </button>
                                    <button onclick="actionAlert('تم البيع')" class="bg-green-50 hover:bg-green-100 text-green-600 py-1.5 rounded text-[10px] font-bold transition flex flex-col items-center gap-0.5">
                                        <i class="fa-solid fa-check-double"></i> مباع
                                    </button>
                                </div>
                            </div>
                        </div>`;
                    });
                } else {
                    grid.innerHTML = `<div class="col-span-full text-center py-8 text-gray-400 font-bold text-sm">لا توجد لديك حسابات حالياً.</div>`;
                }
            } catch (error) {
                grid.innerHTML = `<div class="col-span-full text-center py-8 text-red-500 font-bold text-sm">حدث خطأ أثناء جلب الحسابات.</div>`;
            }
        }

        // 3. إرسال حساب جديد للسيرفر
        async function submitNewAccount(event) {
            event.preventDefault(); 
            
            const btn = document.getElementById('submitAccBtn');
            const errorText = document.getElementById('submitError');
            const imageFile = document.getElementById('accImage').files[0];
            
            if (!imageFile) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> جاري الرفع للـ Cloudflare...';
            errorText.classList.add('hidden');

            const formData = new FormData();
            formData.append('sellerName', currentSeller);
            formData.append('image', imageFile);
            formData.append('title', document.getElementById('accTitle').value);
            formData.append('bankPrice', document.getElementById('accBankPrice').value);
            formData.append('webPrice', document.getElementById('accWebPrice').value);
            formData.append('email', document.getElementById('accEmail').value);
            formData.append('password', document.getElementById('accPassword').value);
            formData.append('isGg', document.getElementById('accGg').checked);
            formData.append('isIos', document.getElementById('accIos').checked);

            try {
                const response = await fetch(`${API_BASE_URL}/add-account`, {
                    method: 'POST',
                    body: formData 
                });

                const result = await response.json();

                if (result.success) {
                    closeAddModal();
                    document.getElementById('addForm').reset(); 
                    showToast("تمت إضافة الحساب بنجاح!");
                    fetchMyAccounts(); 
                } else {
                    errorText.innerText = result.message || "حدث خطأ أثناء الرفع";
                    errorText.classList.remove('hidden');
                }
            } catch (error) {
                errorText.innerText = "تعذر الاتصال بالسيرفر. حاول مرة أخرى.";
                errorText.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'نشر الحساب <i class="fa-solid fa-cloud-arrow-up ml-2"></i>';
            }
        }

        function openAddModal() {
            document.getElementById('addAccountModal').classList.remove('hidden');
        }

        function closeAddModal() {
            document.getElementById('addAccountModal').classList.add('hidden');
            document.getElementById('submitError').classList.add('hidden');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = message;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 3000);
        }

        function copyText(text) {
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => showToast("تم النسخ بنجاح"));
        }

        async function downloadImage(imageSrc, id) {
            try {
                const response = await fetch(imageSrc);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `Account_${id}.webp`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
            } catch (err) {
                alert("حدث خطأ أثناء تنزيل الصورة");
            }
        }

        function actionAlert(action) {
            alert(`سيتم برمجة زر (${action}) في الخطوة القادمة، ليتصل بالسيرفر مباشرة!`);
        }

        function logout() {
            localStorage.removeItem('epec_seller_key'); 
            currentSeller = '';
            document.getElementById('sellerKeyInput').value = '';
            document.getElementById('dashboardScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('flex');
            document.getElementById('loginScreen').classList.remove('hidden');
        }
    </script>
</body>
</html>
